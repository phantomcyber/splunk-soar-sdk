name: Run Semantic Release
on:
  push:
    branches:
      - main
      - beta

jobs:
  semantic_release:
    runs-on: ubuntu-latest
    concurrency:
      # Guarantee only one ongoing release job per branch at a time
      group: pypi-${{ github.ref }}
    environment:
      name: pypi
      url: https://pypi.org/project/splunk-soar-sdk/
    permissions:
      contents: write  # Required for semantic-release to create release tags
      pull-requests: write  # Required for semantic-release to comment on PRs in release
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.SEMANTIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_PRIVATE_KEY }}
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.13
      - name: Install semantic-release dependencies
        run: npm install --global semantic-release @semantic-release/exec @semantic-release/git
      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: semantic-release
      - name: Capture release version
        id: release-version
        run: |
          if [[ -s release_version.txt ]]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$(cat release_version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check out the newly-created tag
        if: ${{ steps.release-version.outputs.released == 'true' }}
        run: git fetch --tags && git checkout "$(cat release_version.txt)"
      - name: Build package
        if: ${{ steps.release-version.outputs.released == 'true' }}
        run: uv build
      - name: Publish to PyPI
        if: ${{ steps.release-version.outputs.released == 'true' }}
        run: uv publish
      - name: Find the GitHub release and upload the artifacts to it
        if: ${{ steps.release-version.outputs.released == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { uploadReleaseArtifacts } = await import('${{ github.workspace }}/.github/utils/github.js');
            await uploadReleaseArtifacts({github, context, core});
          github-token: ${{ steps.app-token.outputs.token }}
      - name: Update example apps to released SDK
        if: ${{ github.ref_name == 'main' && steps.release-version.outputs.released == 'true' }}
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          git checkout main
          git pull --ff-only origin main

          for app in \
            tests/example_app \
            tests/example_app_plaintext_state \
            tests/example_app_with_oauth \
            tests/example_app_with_webhook
          do
            uv lock --project "$app" --upgrade-package splunk-soar-sdk
          done

          git config user.name "semantic-release"
          git config user.email "semantic-release@users.noreply.github.com"
          git add \
            tests/example_app/uv.lock \
            tests/example_app_plaintext_state/uv.lock \
            tests/example_app_with_oauth/uv.lock \
            tests/example_app_with_webhook/uv.lock

          if git diff --cached --quiet; then
            echo "Example app lockfiles already use splunk-soar-sdk ${RELEASE_VERSION}."
            exit 0
          fi

          git commit -m "chore: update example apps to splunk-soar-sdk ${RELEASE_VERSION} [skip ci]"
          git push origin HEAD:main
